<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>발음 훈련</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F7EE;
  --surface:#F7FAF5;
  --card:#F7FAF5;
  --card2:#EBF4E7;
  --border:#C8E0C0;
  --text:#2C2418;
  --text2:#7A7060;
  --sub:#ADA89E;
  --accent:#52A869;
  --accent2:#3A8A50;
  --accent-dim:rgba(122,140,110,0.10);
  --warn:#B05858;
  --warn-dim:rgba(176,88,88,0.10);
  --gold:#8A7C5E;
  --gold-dim:rgba(138,124,94,0.10);
  --blue:#3A6E9E;
  --blue-dim:rgba(58,110,158,0.10);
  --purple:#6A6E9E;
  --purple-dim:rgba(106,110,158,0.10);
  --radius:16px;
  --radius-sm:10px;
  --shadow-3d:0 6px 16px rgba(80,70,50,0.14), inset 0 1px 0 rgba(255,255,255,0.55);
  --shadow-3d-lg:0 10px 26px rgba(80,70,50,0.20), inset 0 1px 0 rgba(255,255,255,0.60);
  --shadow-3d-pressed:inset 0 3px 8px rgba(0,0,0,0.13);
  --shadow-inset:inset 0 2px 8px rgba(0,0,0,0.09);
  --font-ko:'Noto Sans KR',sans-serif;
  --font-en:'Space Mono',monospace;
}
/* 다크 모드 */
body.dark{
  --bg:#111412;
  --surface:#181C1A;
  --card:#1C2220;
  --card2:#222820;
  --border:#2A3028;
  --text:#EDE8DE;
  --text2:#8A9488;
  --sub:#4A5A50;
  --accent:#5EC87A;
  --accent2:#6A8E70;
  --accent-dim:rgba(140,168,122,0.12);
  --warn:#C07070;
  --warn-dim:rgba(192,112,112,0.12);
  --gold:#C0A060;
  --gold-dim:rgba(192,160,96,0.12);
  --blue:#6A9FCC;
  --blue-dim:rgba(106,159,204,0.12);
  --purple:#A07ACC;
  --purple-dim:rgba(160,122,204,0.12);
  --shadow-3d:0 6px 16px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
  --shadow-3d-lg:0 10px 26px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.13);
  --shadow-3d-pressed:inset 0 3px 8px rgba(0,0,0,0.35);
  --shadow-inset:inset 0 2px 8px rgba(0,0,0,0.30);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--font-ko);
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
  overscroll-behavior:none;
}
button{font-family:var(--font-ko);cursor:pointer;border:none;outline:none;transition:all 0.15s ease;user-select:none;}
button:active{transform:scale(0.95);}

/* ─── Layout ─── */
#app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
  background:var(--surface);
  border-bottom:none;
  box-shadow:0 4px 14px rgba(0,0,0,0.25), inset 0 -1px 0 rgba(255,255,255,0.05);
  flex-shrink:0;
}
.app-title{
  font-family:var(--font-en);
  font-size:14px;font-weight:700;
  color:var(--accent);
  letter-spacing:-0.5px;
}
.app-subtitle{font-size:11px;color:var(--sub);margin-top:1px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  background:var(--card2);color:var(--text2);border:none;
  box-shadow:var(--shadow-3d);
}
.icon-btn:hover{background:var(--accent-dim);color:var(--accent);box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.icon-btn:active{box-shadow:var(--shadow-3d-pressed);transform:translateY(1px);}

/* ─── Level Tabs ─── */
#levelBar{
  display:flex;gap:0;
  background:var(--surface);
  border-bottom:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.15),inset 0 -1px 0 rgba(255,255,255,0.05);
  flex-shrink:0;
  padding:0 12px;
}
.level-tab{
  flex:1;padding:10px 0 9px;
  font-size:12px;font-weight:700;
  color:var(--sub);
  background:transparent;
  border-bottom:2px solid transparent;
  border-radius:0;
  transition:all 0.18s;
  letter-spacing:0.02em;
}
.level-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.level-tab .lv-badge{
  font-size:9px;font-weight:800;font-family:var(--font-en);
  padding:1px 6px;border-radius:999px;
  background:var(--card2);color:var(--sub);
  margin-left:4px;
  box-shadow:0 2px 5px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.10);
}
.level-tab.active .lv-badge{background:var(--accent-dim);color:var(--accent);box-shadow:0 2px 5px rgba(140,168,122,0.20);}

/* ─── Category Pills ─── */
#catScroll{
  display:flex;gap:6px;padding:10px 14px 8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;flex-shrink:0;
}
#catScroll::-webkit-scrollbar{display:none;}
.cat-pill{
  padding:6px 14px;border-radius:999px;
  font-size:11px;font-weight:700;white-space:nowrap;
  background:var(--card);color:var(--text2);border:none;
  flex-shrink:0;cursor:pointer;transition:all 0.15s;
  box-shadow:var(--shadow-3d);
}
.cat-pill:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.cat-pill:active{box-shadow:var(--shadow-3d-pressed);transform:translateY(1px);}
.cat-pill.active{background:var(--accent-dim);color:var(--accent);border:none;box-shadow:0 4px 12px rgba(140,168,122,0.30),inset 0 1px 0 rgba(255,255,255,0.15);}

/* ─── Main content area ─── */
#mainArea{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 14px 80px;
}

/* ─── Mode Toggle ─── */
#modeToggle{
  display:flex;gap:6px;padding:10px 14px 8px;
  flex-shrink:0;
}
.mode-btn{
  flex:1;padding:9px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;
  background:var(--card);color:var(--sub);border:none;
  transition:all 0.15s;
  box-shadow:var(--shadow-3d);
}
.mode-btn:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.mode-btn:active{box-shadow:var(--shadow-3d-pressed);transform:translateY(1px);}
.mode-btn.active{background:var(--accent-dim);color:var(--accent);border:none;box-shadow:0 5px 14px rgba(140,168,122,0.30),inset 0 1px 0 rgba(255,255,255,0.15);}

/* ─── Practice Card ─── */
.practice-section{margin-bottom:16px;}
.section-header{
  font-size:11px;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:0.1em;
  padding:14px 0 8px;
}
.phono-card{
  background:var(--card);border:none;
  border-radius:var(--radius);padding:0;
  overflow:hidden;
  margin-bottom:10px;
  transition:all 0.2s;
  box-shadow:var(--shadow-3d);
}
.phono-card:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.phono-card-head{
  display:flex;align-items:center;
  padding:12px 14px;gap:10px;
  cursor:pointer;
}
.phono-tag{
  font-size:18px;font-weight:700;font-family:var(--font-en);
  color:var(--accent);min-width:40px;text-align:center;
  letter-spacing:-1px;
}
.phono-info{flex:1;}
.phono-name{font-size:13px;font-weight:700;color:var(--text);}
.phono-tip{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4;}
.phono-expand{font-size:16px;color:var(--sub);transition:transform 0.2s;}
.phono-card.expanded .phono-expand{transform:rotate(180deg);}

.phono-body{
  display:none;
  border-top:none;
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.10);
  padding:14px;
}
.phono-card.expanded .phono-body{display:block;}

/* ─── Word Pairs ─── */
.pair-row{
  display:flex;gap:8px;margin-bottom:8px;align-items:stretch;
}
.pair-word{
  flex:1;background:var(--card2);border:none;
  border-radius:var(--radius-sm);padding:10px 12px;
  cursor:pointer;transition:all 0.15s;
  display:flex;flex-direction:column;gap:3px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-3d);
}
.pair-word:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.pair-word:active{box-shadow:var(--shadow-3d-pressed);transform:scale(0.97);}
.pair-word.playing{border:none;background:var(--accent-dim);box-shadow:0 5px 16px rgba(140,168,122,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.pair-word .pw-en{
  font-size:16px;font-weight:700;font-family:var(--font-en);
  color:var(--text);letter-spacing:-0.5px;
}
.pair-word .pw-ipa{
  font-size:11px;color:var(--text2);font-family:var(--font-en);
}
.pair-word .pw-ko{font-size:11px;color:var(--sub);}
.pair-word .play-hint{
  position:absolute;top:7px;right:8px;
  font-size:12px;color:var(--accent);opacity:0.5;
}
.pair-word:hover .play-hint{opacity:1;}
.pair-sep{
  display:flex;align-items:center;
  font-size:10px;font-weight:700;color:var(--sub);
  padding:0 2px;
}

/* ─── Key Difference Tip ─── */
.diff-box{
  background:var(--accent-dim);border:none;box-shadow:0 3px 10px rgba(140,168,122,0.20),inset 0 1px 0 rgba(255,255,255,0.10);
  border-radius:var(--radius-sm);padding:10px 12px;
  font-size:12px;color:var(--text2);line-height:1.6;
  margin-bottom:10px;
}
.diff-box strong{color:var(--accent);}

/* ─── Play All Button ─── */
.play-all-btn{
  width:100%;padding:11px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:700;
  background:var(--accent-dim);color:var(--accent);
  border:none;
  box-shadow:0 5px 14px rgba(140,168,122,0.28),inset 0 1px 0 rgba(255,255,255,0.15);
  margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.play-all-btn:hover{box-shadow:0 7px 20px rgba(140,168,122,0.40);transform:translateY(-1px);}
.play-all-btn:active{background:var(--accent);color:#000;}
.play-all-btn.playing{
  background:var(--accent);color:#000;
  animation:pulse-btn 1s ease-in-out infinite;
}
@keyframes pulse-btn{
  0%, 100%{opacity:1;}
  50%{opacity:0.7;}
}

/* ─── Quiz Mode ─── */
#quizArea{
  flex:1;display:flex;flex-direction:column;
  padding:16px 14px 80px;
  gap:14px;
  overflow-y:auto;
}
.quiz-card{
  background:var(--card);border:none;
  border-radius:20px;padding:20px;
  text-align:center;
  box-shadow:var(--shadow-3d);
}
.quiz-prompt{
  font-size:12px;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;
}
.quiz-listen-btn{
  width:90px;height:90px;border-radius:50%;
  background:var(--accent-dim);border:none;
  box-shadow:0 6px 20px rgba(140,168,122,0.35),inset 0 1px 0 rgba(255,255,255,0.15);
  font-size:36px;
  display:flex;align-items:center;justify-content:center;
  margin:12px auto;
  transition:all 0.2s;
}
.quiz-listen-btn:active{transform:scale(0.93);background:var(--accent);color:#000;}
.quiz-listen-btn.playing{
  animation:pulse-ring 1s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(77,255,180,0.5);}
  70%{box-shadow:0 0 0 16px rgba(77,255,180,0);}
  100%{box-shadow:0 0 0 0 rgba(77,255,180,0);}
}
.quiz-hint{font-size:11px;color:var(--sub);margin-bottom:14px;}
.quiz-choices{display:flex;flex-direction:column;gap:8px;}
.quiz-choice{
  padding:14px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;font-family:var(--font-en);
  background:var(--card2);color:var(--text);border:none;
  transition:all 0.15s;letter-spacing:-0.3px;
  box-shadow:var(--shadow-3d);
}
.quiz-choice:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
.quiz-choice.correct{background:rgba(77,255,180,0.2);color:var(--accent);border:none;box-shadow:0 4px 14px rgba(140,168,122,0.35),inset 0 1px 0 rgba(255,255,255,0.15);}
.quiz-choice.wrong{background:rgba(255,107,107,0.2);color:var(--warn);border:none;box-shadow:0 4px 14px rgba(192,112,112,0.30),inset 0 1px 0 rgba(255,255,255,0.10);}
.quiz-choice:disabled{cursor:default;transform:none;}

.quiz-result{
  margin-top:4px;padding:12px 14px;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  line-height:1.5;
  display:none;
}
.quiz-result.show{display:block;}
.quiz-result.ok{background:rgba(77,255,180,0.12);color:var(--accent);}
.quiz-result.fail{background:rgba(255,107,107,0.12);color:var(--warn);}

.quiz-next-btn{
  width:100%;padding:13px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:700;
  background:var(--accent);color:#000;border:none;
  box-shadow:0 6px 18px rgba(140,168,122,0.45),inset 0 1px 0 rgba(255,255,255,0.28);
  display:none;
  margin-top:6px;
}
.quiz-next-btn.show{display:block;}

/* ─── Stats bar ─── */
#statsBar{
  display:flex;gap:12px;align-items:center;
  padding:8px 14px;
  background:var(--surface);border-bottom:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.15),inset 0 -1px 0 rgba(255,255,255,0.05);
  flex-shrink:0;
}
.stat-item{display:flex;align-items:center;gap:5px;}
.stat-label{font-size:10px;color:var(--sub);font-weight:600;}
.stat-value{font-size:13px;font-weight:800;font-family:var(--font-en);}
.stat-value.green{color:var(--accent);}
.stat-value.red{color:var(--warn);}
.stat-value.gold{color:var(--gold);}
.stat-sep{width:1px;height:16px;background:var(--border);}
.streak-badge{
  margin-left:auto;
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:999px;
  background:var(--gold-dim);color:var(--gold);
  font-family:var(--font-en);
  box-shadow:0 3px 8px rgba(192,160,96,0.20),inset 0 1px 0 rgba(255,255,255,0.15);
}

/* ─── Progress bar ─── */
.quiz-progress{
  display:flex;align-items:center;gap:8px;
  padding:0 14px 8px;flex-shrink:0;
}
.q-prog-bar{flex:1;height:4px;border-radius:999px;background:var(--border);box-shadow:var(--shadow-inset);}
.q-prog-fill{height:100%;border-radius:999px;background:var(--accent);transition:width 0.4s;}
.q-prog-label{font-size:10px;font-weight:700;font-family:var(--font-en);color:var(--sub);}

/* ─── Tip sheet ─── */
.mouth-tip{
  background:var(--card2);border:none;box-shadow:var(--shadow-3d);
  border-radius:var(--radius-sm);padding:10px 12px;
  font-size:11px;color:var(--text2);margin-top:8px;line-height:1.6;
}
.mouth-tip-title{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}

/* ─── Level intro ─── */
.level-intro{
  margin:12px 0 4px;
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border:none;border-radius:var(--radius);
  box-shadow:var(--shadow-3d);
  padding:14px;
  display:flex;gap:12px;align-items:center;
}
.lv-icon{font-size:32px;}
.lv-intro-name{font-size:16px;font-weight:800;color:var(--text);}
.lv-intro-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4;}

/* ─── Sentence mode ─── */
.sent-card{
  background:var(--card);border:none;
  border-radius:var(--radius);padding:14px;
  margin-bottom:10px;
  box-shadow:var(--shadow-3d);
}
.sent-en{
  font-size:15px;font-weight:700;color:var(--text);
  font-family:var(--font-en);letter-spacing:-0.3px;line-height:1.5;
}
.sent-en .highlight{color:var(--accent);}
.sent-ko{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5;}
.sent-actions{display:flex;gap:8px;margin-top:10px;}
.sent-play{
  flex:1;padding:9px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:700;
  background:var(--accent-dim);color:var(--accent);border:none;
  box-shadow:0 5px 14px rgba(140,168,122,0.28),inset 0 1px 0 rgba(255,255,255,0.15);
}
.sent-play.playing{
  background:var(--accent);color:#000;
  animation:pulse-btn 1s ease-in-out infinite;
}
.sent-slow{
  padding:9px 14px;border-radius:var(--radius-sm);
  font-size:11px;font-weight:700;
  background:var(--card2);color:var(--text2);border:1.5px solid var(--border);
}

/* ─── Toast ─── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);
  padding:9px 20px;border-radius:999px;
  font-size:13px;font-weight:700;
  opacity:0;transition:all 0.25s;pointer-events:none;
  z-index:9999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── Empty ─── */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--sub);
  font-size:14px;
}

/* Dark mode toggle */
/* (다크모드는 body.dark로 처리됨) */
</style>
</head>
<body>

<div id="app-header">
  <div>
    <div class="app-title">🎧 PRON TRAINER</div>
    <div class="app-subtitle">한국인을 위한 영어 발음 훈련</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="테마">🌙</button>
    <button class="icon-btn" onclick="resetStats()" title="통계 초기화">🔄</button>
  </div>
</div>

<!-- Level tabs -->
<div id="levelBar">
  <button class="level-tab active" data-level="beginner" onclick="switchLevel('beginner')">
    🌱 초급 <span class="lv-badge">Beginner</span>
  </button>
  <button class="level-tab" data-level="intermediate" onclick="switchLevel('intermediate')">
    🌿 중급 <span class="lv-badge">Mid</span>
  </button>
  <button class="level-tab" data-level="advanced" onclick="switchLevel('advanced')">
    🌳 고급 <span class="lv-badge">Adv</span>
  </button>
</div>

<!-- Stats -->
<div id="statsBar">
  <div class="stat-item">
    <span class="stat-label">맞음</span>
    <span class="stat-value green" id="statCorrect">0</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="stat-label">틀림</span>
    <span class="stat-value red" id="statWrong">0</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="stat-label">정확도</span>
    <span class="stat-value gold" id="statAcc">—</span>
  </div>
  <div class="streak-badge" id="streakBadge">🔥 0 연속</div>
</div>

<!-- Mode toggle -->
<div id="modeToggle">
  <button class="mode-btn active" data-mode="learn" onclick="switchMode('learn')">📖 학습</button>
  <button class="mode-btn" data-mode="quiz" onclick="switchMode('quiz')">🎯 퀴즈</button>
  <button class="mode-btn" data-mode="sentence" onclick="switchMode('sentence')">💬 문장</button>
</div>

<!-- Category pills -->
<div id="catScroll"></div>

<!-- Learn mode -->
<div id="learnArea" style="overflow-y:auto;flex:1;padding:0 14px 80px;">
  <div id="levelIntro"></div>
  <div id="phonoList"></div>
</div>

<!-- Quiz mode -->
<div id="quizArea" style="display:none;">
  <div class="quiz-progress" id="quizProgressWrap">
    <div class="q-prog-bar"><div class="q-prog-fill" id="quizProgFill" style="width:0%"></div></div>
    <span class="q-prog-label" id="quizProgLabel">0 / 0</span>
  </div>
  <div class="quiz-card" id="quizCard">

function saveStats(){ localStorage.setItem('pronStats', JSON.stringify(stats)); }

  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statWrong').textContent = stats.wrong;
  const total = stats.correct + stats.wrong;
  document.getElementById('statAcc').textContent = total > 0 ? Math.round(stats.correct/total*100)+'%' : '—';

}

}

// ──────────────────────────────────────────────
// TTS
// ──────────────────────────────────────────────
function speak(text, rate=0.85, btn=null){
  if(speechSynth.speaking) speechSynth.cancel();
  // clean text
  let clean = text.replace(/\s*\/[^/]*\//g,'').replace(/\s*→.*/,'').replace(/↘|↗/g,'').trim();
  // remove pronunciation hints in parentheses
  clean = clean.split(' ')[0];
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'en-US';
  utt.rate = rate;
  utt.pitch = 1;
  if(btn){
    btn.classList.add('playing');
    utt.onend = ()=>{ btn.classList.remove('playing'); };
    utt.onerror = ()=>{ btn.classList.remove('playing'); };
  }
  speechSynth.speak(utt);
}

let sentencePlayState = {};  // 문장별 재생 상태

function speakSentence(text, rate=0.85, btn=null){
  // 토글 기능
  const sentenceId = text.substring(0, 30) + rate; // 문장과 속도로 고유 ID 생성
  
  if(!sentencePlayState[sentenceId]){
    sentencePlayState[sentenceId] = { isPlaying: false, text: text, rate: rate };
  }

  const state = sentencePlayState[sentenceId];

  if(state.isPlaying){
    // 재생 중이면 중지
    speechSynth.cancel();
    state.isPlaying = false;
    if(btn){
      btn.classList.remove('playing');
      // 원래 텍스트로 복원
      btn.textContent = rate === 0.5 ? '🐢 천천히' : '▶ 듣기';
    }
    return;
  }

  // 재생 시작
  state.isPlaying = true;
  if(btn){
    btn.classList.add('playing');
    // 재생 중 표시
    btn.textContent = '⏸ 중단';
  }

  function playRepeat(){
    if(!state.isPlaying) return;
    
    let clean = text.replace(/<[^>]*>/g,'');
    const utt = new SpeechSynthesisUtterance(clean);
    utt.lang='en-US'; 
    utt.rate=rate; 
    utt.pitch=1;
    utt.onend=()=>{
      if(state.isPlaying){
        // 문장 재생 완료 후 다시 재생
        setTimeout(playRepeat, 1000);
      }
    };
    utt.onerror=()=>{
      if(state.isPlaying){
        setTimeout(playRepeat, 1000);
      }
    };
    speechSynth.speak(utt);
  }

  speechSynth.cancel();
  playRepeat();
}

let playAllState = {};  // 각 카테고리의 재생 상태 저장

function playAll(catId){
  const btn = event.target;
  const lvData = DATA[currentLevel];
  const cat = lvData.categories.find(c=>c.id===catId);
  if(!cat) return;

  if(!playAllState[catId]){
    playAllState[catId] = { isPlaying: false, idx: 0 };
  }

  const state = playAllState[catId];
  
  if(state.isPlaying){
    // 재생 중이면 중지
    speechSynth.cancel();
    state.isPlaying = false;
    btn.classList.remove('playing');
    btn.textContent = '▶▶ 전체 연속 듣기';
    showToast('재생 중지됨 ⏹️');
    return;
  }

  // 재생 시작
  state.isPlaying = true;
  state.idx = 0;
  btn.classList.add('playing');
  btn.textContent = '⏸ 재생 중단';
  showToast('반복 재생 시작... 🔊');

  function playNext(){
    if(!state.isPlaying) return;
    
    if(state.idx >= cat.pairs.length*2){
      // 한 사이클 완료, 처음부터 다시
      state.idx = 0;
    }

    const pairIdx = Math.floor(state.idx/2);
    const side = state.idx%2;
    const word = side===0 ? cat.pairs[pairIdx].en1 : cat.pairs[pairIdx].en2;
    const wordText = word.split(' ')[0];
    
    const utt = new SpeechSynthesisUtterance(wordText);
    utt.lang='en-US'; 
    utt.rate=0.8;
    utt.onend=()=>{ 
      if(state.isPlaying){
        state.idx++; 
        setTimeout(playNext, 400);
      }
    };
    utt.onerror=()=>{
      if(state.isPlaying){
        state.idx++; 
        setTimeout(playNext, 400);
      }
    };
    
    speechSynth.speak(utt);
  }

  speechSynth.cancel();
  playNext();
}

// ──────────────────────────────────────────────
// Quiz mode
// ──────────────────────────────────────────────
function buildQuizQuestions(){
  const lvData = DATA[currentLevel];
  const cats = currentCat ? lvData.categories.filter(c=>c.id===currentCat) : lvData.categories;
  let qs = [];
  cats.forEach(cat=>{
    cat.pairs.forEach(p=>{
      // type: which sound is this?
      qs.push({ word:p.en1, ipa:p.ipa1, choices:[p.en1, p.en2], correctIdx:0, cat:cat.name });
      qs.push({ word:p.en2, ipa:p.ipa2, choices:[p.en1, p.en2], correctIdx:1, cat:cat.name });
    });
  });
  // shuffle
  for(let i=qs.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [qs[i],qs[j]]=[qs[j],qs[i]];
  }
  return qs.slice(0,10);
}

function startQuiz(){
  quiz.questions = buildQuizQuestions();
  quiz.idx = 0;
  quiz.answered = false;
  renderQuestion();
}

function renderQuestion(){
  if(quiz.idx >= quiz.questions.length){
    showQuizComplete(); return;
  }
  const q = quiz.questions[quiz.idx];
  quiz.answered = false;
  quiz.word = q.word;
  quiz.correct = q.correctIdx;

  const prog = (quiz.idx/quiz.questions.length)*100;
  document.getElementById('quizProgFill').style.width = prog+'%';
  document.getElementById('quizProgLabel').textContent = (quiz.idx+1)+' / '+quiz.questions.length;

  document.getElementById('quizListenBtn').classList.remove('playing');
  document.getElementById('quizHint').textContent = '버튼을 눌러 소리를 들으세요';
  document.getElementById('quizResult').className='quiz-result';
  document.getElementById('quizResult').textContent='';
  document.getElementById('quizNextBtn').className='quiz-next-btn';

  // choices
  const choicesEl = document.getElementById('quizChoices');
  choicesEl.innerHTML = '';
  // shuffle choices for display
  const indices = [0,1];
  const shuf = [...indices].sort(()=>Math.random()-0.5);
  shuf.forEach(ci=>{
    const btn = document.createElement('button');
    btn.className='quiz-choice';
    btn.textContent = q.choices[ci];
    btn.dataset.idx = ci;
    btn.onclick = ()=>answerQuiz(ci, btn, q);
    choicesEl.appendChild(btn);
  });
}

function playQuizSound(){
  if(!quiz.questions.length) return;
  const q = quiz.questions[quiz.idx];
  const btn = document.getElementById('quizListenBtn');
  btn.classList.add('playing');
  const utt = new SpeechSynthesisUtterance(q.word.split(' ')[0]);
  utt.lang='en-US'; utt.rate=0.75;
  utt.onend=()=>btn.classList.remove('playing');
  utt.onerror=()=>btn.classList.remove('playing');
  speechSynth.cancel();
  speechSynth.speak(utt);
  document.getElementById('quizHint').textContent = '들었나요? 아래에서 선택하세요';
}

function answerQuiz(selectedIdx, btn, q){
  if(quiz.answered) return;
  quiz.answered = true;
  const isCorrect = selectedIdx === quiz.correct;

  // disable all choices
  document.querySelectorAll('.quiz-choice').forEach(b=>{
    b.disabled = true;
    if(parseInt(b.dataset.idx) === quiz.correct) b.classList.add('correct');
  });
  if(!isCorrect) btn.classList.add('wrong');

  // update stats
  if(isCorrect){
    stats.correct++; stats.streak++;
    showToast('✅ 정답!');
  } else {
    stats.wrong++; stats.streak=0;
    showToast('❌ 틀렸어요');
  }
  saveStats(); updateStatsUI();

  // result message
  const resultEl = document.getElementById('quizResult');
  resultEl.className = 'quiz-result show ' + (isCorrect?'ok':'fail');
  resultEl.innerHTML = isCorrect
    ? `✅ 맞았습니다! <b>${q.word}</b> [${q.ipa}]`
    : `❌ 정답은 <b>${q.choices[quiz.correct]}</b> [${q.ipa}] 입니다`;

  document.getElementById('quizNextBtn').className='quiz-next-btn show';
}

function nextQuestion(){
  quiz.idx++;
  renderQuestion();
}

function showQuizComplete(){
  const total = quiz.questions.length;
  const correct = stats.correct;
  document.getElementById('quizCard').innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:48px;margin-bottom:12px;">🎉</div>
      <div style="font-size:20px;font-weight:800;color:var(--accent);margin-bottom:6px;">퀴즈 완료!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px;">${total}문제 완료</div>
      <button onclick="startQuiz()" style="width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:800;background:var(--accent);color:#000;border:none;cursor:pointer;">
        🔄 다시 시작
      </button>
    </div>
  `;
}

// ──────────────────────────────────────────────
// Sentence mode
// ──────────────────────────────────────────────
function renderSentences(){
  const lvData = DATA[currentLevel];
  
  // 현재 선택된 카테고리가 없으면 첫 번째 카테고리 선택
  if(!currentCat && lvData.categories.length > 0){
    currentCat = lvData.categories[0].id;
  }
  
  const cat = lvData.categories.find(c=>c.id===currentCat);
  if(!cat || !cat.sentences) return;
  
  let html = `<div style="padding:10px 0 6px;" class="section-header">📝 ${cat.name} 훈련 문장 (${cat.sentences.length}개)</div>`;
  cat.sentences.forEach((s,i)=>{
    html += `
    <div class="sent-card">
      <div style="font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:8px;">${s.focus}</div>
      <div class="sent-en">${s.en}</div>
      <div class="sent-ko">${s.ko}</div>
      <div class="sent-actions">
        <button class="sent-play" id="sbtn-${i}" onclick="speakSentence('${s.en.replace(/'/g,"\\'")}', 0.8, document.getElementById('sbtn-${i}'))">▶ 듣기</button>
        <button class="sent-slow" onclick="speakSentence('${s.en.replace(/'/g,"\\'")}', 0.5, this)">🐢 천천히</button>
      </div>
    </div>
    `;
  });
  document.getElementById('sentenceList').innerHTML = html;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}
