<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<!-- ★ 깜빡임 방지: CSS/렌더링 전에 다크모드 즉시 적용 -->
<script>
(function(){
  var d = localStorage.getItem('darkMode') || localStorage.getItem('lmTheme');
  if(d === 'true' || d === 'dark'){
    document.documentElement.classList.add('dark-pending');
  }
})();
</script>
<style>
html.dark-pending { background: #161412; }
html.dark-pending body { background: #161412 !important; color: #EDE8DE !important; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
/* ══ 통합 디자인 토큰 (4개 앱 공통) ══ */
:root{
  --bg:#F0F7EE;
  --surface:#F7FAF5;
  --card:#F7FAF5;
  --card2:#EBF4E7;
  --text:#2C2418;
  --text2:#7A7060;
  --sub:#ADA89E;
  --border:#C8E0C0;
  --accent:#52A869;
  --accent2:#3A8A50;
  --accent-light:#D8F0DC;
  --ok:#3DAB6A;
  --ok-light:#D4F0E0;
  --no:#B05858;
  --no-light:#EFE6E6;
  --warn:#B87840;
  --warn-light:#F0E8DC;
  --star:#8A7C5E;
  --shadow:0 2px 16px rgba(80,70,50,0.10);
  --shadow-lg:0 8px 36px rgba(80,70,50,0.18);
  --shadow-3d:0 6px 16px rgba(80,70,50,0.14), inset 0 1px 0 rgba(255,255,255,0.55);
  --shadow-3d-lg:0 10px 26px rgba(80,70,50,0.20), inset 0 1px 0 rgba(255,255,255,0.60);
  --shadow-3d-pressed:inset 0 3px 8px rgba(0,0,0,0.13);
  --shadow-inset:inset 0 2px 8px rgba(0,0,0,0.09);
  --radius:16px;
}
body.dark{
  --bg:#0E1A10;
  --surface:#141F14;
  --card:#1A2A1A;
  --card2:#1F321F;
  --text:#EDE8DE;
  --text2:#9E9890;
  --sub:#6A6460;
  --border:#2A4030;
  --accent:#5EC87A;
  --accent2:#7AD894;
  --accent-light:#142814;
  --ok:#4DC878;
  --ok-light:#0A2012;
  --no:#C07070;
  --no-light:#2A1818;
  --warn:#C0905A;
  --warn-light:#201A10;
  --star:#A09478;
  --shadow:0 2px 16px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 36px rgba(0,0,0,0.7);
  --shadow-3d:0 6px 16px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
  --shadow-3d-lg:0 10px 26px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.13);
  --shadow-3d-pressed:inset 0 3px 8px rgba(0,0,0,0.35);
  --shadow-inset:inset 0 2px 8px rgba(0,0,0,0.30);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ── Header ── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--card);border-bottom:none;
  padding:0 20px;height:52px;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 4px 16px rgba(80,70,50,0.12), inset 0 -1px 0 rgba(0,0,0,0.05);overflow-x:auto;white-space:nowrap;
  scrollbar-width:none;
}
header::-webkit-scrollbar{display:none;}
.logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-0.3px;margin-right:6px;flex-shrink:0;}
.header-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}

/* ── Buttons ── */
button{
  padding:6px 13px;border:none;border-radius:8px;
  background:var(--card2);color:var(--text2);
  font-family:inherit;font-size:12.5px;font-weight:500;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;
  box-shadow:var(--shadow-3d);
}
button:hover{color:var(--accent);background:var(--accent-light);box-shadow:var(--shadow-3d-lg);transform:translateY(-1px);}
button:active{box-shadow:var(--shadow-3d-pressed);transform:translateY(1px);}
.btn-primary{background:var(--accent);color:#fff!important;border:none;font-weight:600;box-shadow:0 6px 18px rgba(122,140,110,0.45),inset 0 1px 0 rgba(255,255,255,0.30);}
.btn-primary:hover{background:var(--accent2);color:#fff!important;box-shadow:0 10px 24px rgba(90,110,80,0.50),inset 0 1px 0 rgba(255,255,255,0.25);}
.btn-primary:active{box-shadow:inset 0 3px 8px rgba(0,0,0,0.20);transform:translateY(1px);}
.btn-ok{background:var(--ok-light);color:var(--ok)!important;border:none;font-weight:600;box-shadow:0 6px 16px rgba(60,168,90,0.30),inset 0 1px 0 rgba(255,255,255,0.40);}
.btn-ok:hover{background:var(--ok);color:#fff!important;box-shadow:0 8px 20px rgba(60,168,90,0.45);}
.btn-danger{background:var(--no-light);color:var(--no)!important;border:none;box-shadow:0 6px 16px rgba(176,88,88,0.28),inset 0 1px 0 rgba(255,255,255,0.40);}
.btn-danger:hover{background:var(--no);color:#fff!important;box-shadow:0 8px 20px rgba(176,88,88,0.45);}

/* ── Inputs ── */
input,select{
  padding:6px 11px;border:none;border-radius:8px;
  background:var(--surface);color:var(--text);
  font-family:inherit;font-size:13px;outline:none;transition:box-shadow 0.15s;
  box-shadow:var(--shadow-3d);
}
input:focus,select:focus{box-shadow:var(--shadow-3d-lg), 0 0 0 3px var(--accent-light);}

/* ── Container ── */
.container{max-width:1400px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.container.with-side{padding-right:276px;}

/* ── Section card ── */
.s-card{background:var(--card);border:none;border-radius:var(--radius);box-shadow:var(--shadow-3d);overflow:hidden;}
.s-header{padding:12px 16px;border-bottom:none;box-shadow:0 2px 6px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.35);display:flex;align-items:center;gap:8px;}
.s-title{font-size:13px;font-weight:700;color:var(--text);}

/* ── Nav panel ── */
.nav-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;flex-wrap:wrap;}
#title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}

/* ── Calendar grid ── */
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-head{text-align:center;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;padding:6px 0;letter-spacing:0.05em;}
.day-head.sat{color:var(--sat);} .day-head.sun{color:var(--sun);}

.day{
  background:var(--card);border:none;
  min-height:100px;border-radius:10px;padding:6px 7px;
  display:flex;flex-direction:column;gap:3px;cursor:pointer;
  transition:box-shadow 0.15s, transform 0.15s;
  box-shadow:var(--shadow-3d);
}
.day:hover{box-shadow:var(--shadow-3d-lg);transform:translateY(-2px);}
.day.today{background:var(--accent-light);box-shadow:0 6px 18px rgba(122,140,110,0.32),inset 0 1px 0 rgba(255,255,255,0.40);}
.day.selected{box-shadow:0 6px 18px rgba(122,140,110,0.35),inset 0 1px 0 rgba(255,255,255,0.40);background:var(--card);}
.day.other-month{opacity:0.4;}

.day-num{
  font-size:13px;font-weight:700;color:var(--text);
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0;
}
.day.today .day-num{background:var(--accent);color:#fff;}
.day.sat .day-num{color:var(--sat);}
.day.sun .day-num{color:var(--sun);}

.event{
  font-size:11px;font-weight:500;padding:2px 6px;border-radius:5px;
  display:flex;justify-content:space-between;align-items:center;gap:4px;
  cursor:grab;line-height:1.3;
}
.event span.del{
  opacity:0;font-size:10px;cursor:pointer;color:rgba(0,0,0,0.3);flex-shrink:0;
  transition:opacity 0.1s;
}
.event:hover span.del{opacity:1;}

/* ── Indicator dots for schedule and todos ── */
.day-indicators{
  display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;
}
.indicator-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
}

/* ── Input panels ── */
.panel{background:var(--card);border:none;border-radius:var(--radius);padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;box-shadow:var(--shadow-3d);}
.panel-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.06em;margin-right:2px;}
.category-chip{padding:3px 10px;border-radius:999px;font-size:12px;color:#fff;display:inline-flex;gap:5px;align-items:center;font-weight:500;}
.category-chip .del{cursor:pointer;opacity:0.6;}
.category-chip .del:hover{opacity:1;}

/* ── Todo side panel ── */
.todo-side{
  position:fixed;right:0;top:0;bottom:0;width:256px;
  background:var(--card);border-left:none;
  display:flex;flex-direction:column;z-index:200;
  box-shadow:-6px 0 28px rgba(0,0,0,0.14), inset 1px 0 0 rgba(255,255,255,0.20);
  transition:transform 0.25s ease;
}
.todo-side.hidden{transform:translateX(100%);}
.todo-side-header{padding:10px 12px 8px;border-bottom:none;box-shadow:0 2px 6px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.30);display:flex;flex-direction:column;gap:6px;}
.todo-side-tabs{display:flex;gap:2px;background:var(--card2);border-radius:9px;padding:3px;box-shadow:var(--shadow-inset);}
.todo-side-tab{flex:1;padding:4px 0;font-size:11.5px;font-weight:600;border-radius:7px;border:none;cursor:pointer;background:transparent;color:var(--sub);transition:all 0.15s;}
.todo-side-tab.active{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(122,140,110,0.35),inset 0 1px 0 rgba(255,255,255,0.28);}
.todo-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;background:var(--surface);margin-bottom:3px;font-size:12.5px;box-shadow:var(--shadow-3d);}
.todo-item-done{text-decoration:line-through;color:var(--sub);}

.toggle-side-btn{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  z-index:201;background:var(--accent);color:#fff;
  border:none;border-radius:8px 0 0 8px;
  padding:10px 5px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;
  writing-mode:vertical-lr;letter-spacing:1px;
  box-shadow:-4px 0 18px rgba(122,140,110,0.50),inset 0 1px 0 rgba(255,255,255,0.28);transition:all 0.15s;
}
.toggle-side-btn:hover{background:#2d4bc4;}

/* ── Export modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);justify-content:center;align-items:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--card);color:var(--text);border-radius:16px;padding:22px 24px;width:92%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.25);border:none;}
.modal-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px;}
.modal-section{margin-bottom:14px;}
.form-check{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:3px 0;}
.form-check input{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;}

/* week view */
.week-time{font-size:10px;color:var(--sub);text-align:right;padding-right:6px;padding-top:4px;}

@media(max-width:700px){
  .grid{grid-template-columns:repeat(7,1fr);gap:3px;}
  .day{min-height:60px;padding:4px;}
  .day-num{font-size:10px;}
  .event{font-size:10px;}
  .container{padding:10px 10px;}
}
</style>
</head>

<body>

<header>
  <span class="logo">📅 Schedule</span>
  <div class="header-sep"></div>
  <button onclick="prev()">&#9664;</button>
  <button onclick="goToday()" class="btn-primary">오늘</button>
  <button onclick="next()">&#9654;</button>
  <button onclick="toggleView()">월 / 주</button>
  <div class="header-sep"></div>
  <select id="filter" onchange="render()" style="min-width:90px;"></select>
  <div class="header-sep"></div>
  <button onclick="toggleDark()" style="display:none">&#9680; 테마</button>
  <button onclick="backup()" style="display:none">&#8595; 백업</button>
  <button onclick="restore()" style="display:none">&#8593; 복원</button>
  <button onclick="uploadScheduleToFirebase()" style="display:none;background:var(--ok);color:#fff;border:none;">☁️ Firebase 저장</button>
  <button onclick="downloadScheduleFromFirebase()" style="display:none;background:#0369a1;color:#fff;border:none;">☁️ Firebase 불러오기</button>
  <button onclick="openExportModal()" style="background:#7c3aed;color:#fff;border:none;">&#128229; 내보내기</button>
</header>

<!-- 연도별 내보내기 모달 -->
<div id="exportModal" class="modal-overlay" onclick="if(event.target===this)closeExportModal()">
  <div class="modal-box">
    <div class="modal-title">
      <span>&#128229; 연도별 내보내기</span>
      <button onclick="closeExportModal()" style="background:transparent;border:none;color:var(--sub);font-size:16px;padding:0;cursor:pointer;font-weight:400;">&#10005;</button>
    </div>
    <div class="modal-section">
      <span class="modal-label">연도 선택</span>
      <select id="exportYear" style="width:100%;"></select>
    </div>
    <div class="modal-section">
      <span class="modal-label">포함할 항목</span>
      <label class="form-check"><input type="checkbox" id="expSched" checked> &#128197; 일정</label>
      <label class="form-check"><input type="checkbox" id="expTodo" checked> &#9744; 할일 (미완료)</label>
      <label class="form-check"><input type="checkbox" id="expDone" checked> &#9989; 한일 (완료)</label>
    </div>
    <div class="modal-section">
      <span class="modal-label">파일 형식</span>
      <div style="display:flex;gap:16px;">
        <label class="form-check"><input type="radio" name="expFmt" value="single" checked> 통합 1개</label>
        <label class="form-check"><input type="radio" name="expFmt" value="separate"> 항목별 개별</label>
      </div>
    </div>
    <div class="modal-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <span class="modal-label" style="margin-bottom:0;">미리보기</span>
        <button onclick="refreshExportPreview()" style="font-size:11px;padding:3px 8px;background:transparent;color:var(--accent);border:none;border-radius:6px;box-shadow:0 2px 6px rgba(122,140,110,0.30),inset 0 1px 0 rgba(255,255,255,0.40);">새로고침</button>
      </div>
      <textarea id="exportPreview" readonly style="width:100%;height:130px;font-size:11px;border-radius:8px;border:none;background:var(--surface);color:var(--text);padding:8px 10px;resize:none;box-shadow:var(--shadow-inset);font-family:'DM Mono',monospace;line-height:1.6;"></textarea>
    </div>
    <button onclick="doExport()" class="btn-primary" style="width:100%;padding:10px;border-radius:10px;font-size:14px;font-weight:700;">&#128190; 다운로드</button>
  </div>
</div>

<div class="container">

  <!-- 네비게이션 + 제목 -->
  <div class="s-card">
    <div class="nav-bar">
      <span id="title"></span>
    </div>
  </div>

  <!-- 달력 -->
  <div class="s-card">
    <div style="padding:12px 14px 12px;background:var(--bg);border-radius:var(--radius);">
      <div class="grid" id="dayHeads" style="margin-bottom:6px;min-height:unset;"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- 일정 추가 -->
  <div class="panel">
    <span class="panel-label">일정 추가</span>
    <input type="date" id="date">
    <input type="text" id="text" placeholder="일정 내용" style="flex:1;min-width:160px;">
    <select id="category" style="min-width:100px;"></select>
    <button class="btn-primary" onclick="addEvent()">추가</button>
  </div>

  <!-- 카테고리 관리 -->
  <div class="panel">
    <span class="panel-label">카테고리</span>
    <input type="text" id="newCat" placeholder="새 카테고리 이름" style="min-width:140px;">
    <input type="color" id="catColor" value="#3a5bd9" style="width:36px;height:32px;padding:2px 4px;cursor:pointer;">
    <button onclick="addCategory()">추가</button>
    <div id="catList" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;"></div>
  </div>

</div>

<script>

/* ══ Firebase 동기화 — 더미 (실제 구현은 아래 module 블록) ══ */
// uploadScheduleToFirebase / downloadScheduleFromFirebase 는
// 아래 <script type="module"> 블록에서 window에 노출됩니다.
// 여기서는 로딩 전 클릭 방어용 stub만 정의합니다.
window.uploadScheduleToFirebase   = window.uploadScheduleToFirebase   || (()=>alert('초기화 중입니다. 잠시 후 다시 시도하세요.'));
window.downloadScheduleFromFirebase = window.downloadScheduleFromFirebase || (()=>alert('초기화 중입니다. 잠시 후 다시 시도하세요.'));

let current=new Date()
let view="month"
let dragData=null

let data={
categories:[{name:"기본",color:"#6366f1"}],
events:{}
}

function load(){
  const saved=localStorage.getItem("scheduleData")
  if(saved){
    try{
      const parsed=JSON.parse(saved)
      if(parsed && typeof parsed==='object'){
        data=parsed
        if(!data.events || typeof data.events!=='object' || Array.isArray(data.events)){
          data.events={}
        }
        if(!Array.isArray(data.categories)||data.categories.length===0){
          data.categories=[{name:'기본',color:'#6366f1'}]
        }
      }
    }catch(e){
      console.warn('scheduleData 파싱 오류, 초기화:',e)
      data={categories:[{name:'기본',color:'#6366f1'}],events:{}}
    }
  }
}

function save(){
localStorage.setItem("scheduleData",JSON.stringify(data))
}

function format(d){
  // toISOString()은 UTC 기준이라 한국(UTC+9)에서 날짜가 밀림 → 로컬 기준으로 변환
  const y = d.getFullYear()
  const m = String(d.getMonth()+1).padStart(2,'0')
  const day = String(d.getDate()).padStart(2,'0')
  return y+"-"+m+"-"+day
}

function render(){
const grid=document.getElementById("grid")
grid.innerHTML=""

// 요일 헤더
const headsEl=document.getElementById("dayHeads")
if(headsEl){
  headsEl.innerHTML=""
  const DAY_NAMES=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
  const DAY_KO=["월","화","수","목","금","토","일"]
  if(view==="month"){
    // 일~토 순서로 시작하므로 일요일부터
    ["일","월","화","수","목","금","토"].forEach((d,i)=>{
      const el=document.createElement("div")
      el.className="day-head"+(i===0?" sun":i===6?" sat":"")
      el.textContent=d; headsEl.appendChild(el)
    })
  } else {
    DAY_KO.forEach((d,i)=>{
      const el=document.createElement("div")
      el.className="day-head"+(i===5?" sat":i===6?" sun":"")
      el.textContent=d; headsEl.appendChild(el)
    })
  }
}

const filter=document.getElementById("filter").value
const todayKey=format(new Date())

let start=new Date(current)

if(view==="month"){
start=new Date(current.getFullYear(),current.getMonth(),1)
// 월 시작을 일요일로 맞춤
start.setDate(start.getDate()-start.getDay())
}else{
// 주 뷰: 월요일 시작
const dow=current.getDay()
const diff=dow===0?-6:1-dow
start=new Date(current)
start.setDate(current.getDate()+diff)
}

let days=view==="month"?42:7

document.getElementById("title").textContent=
current.getFullYear()+"년 "+(current.getMonth()+1)+"월"

for(let i=0;i<days;i++){
let d=new Date(start)
d.setDate(start.getDate()+i)
const key=format(d)
const isToday=key===todayKey
const isOtherMonth=view==="month"&&d.getMonth()!==current.getMonth()
const dow=d.getDay()

const div=document.createElement("div")
div.className="day"
if(isToday) div.classList.add("today")
if(isOtherMonth) div.classList.add("other-month")
if(dow===6) div.classList.add("sat")
if(dow===0) div.classList.add("sun")
div.dataset.date=key

const numEl=document.createElement("div")
numEl.className="day-num"
numEl.textContent=d.getDate()
div.appendChild(numEl)

function buildExportText(year, inclSched, inclTodo, inclDone){
  const schedEvents = data.events || {}
  const cats = data.categories || []
  let todos = {}
  try{ todos = JSON.parse(localStorage.getItem("lmTodos")||"{}") }catch{}

  const allDates = new Set()
  if(inclSched) Object.keys(schedEvents).filter(d=>d.startsWith(year)).forEach(d=>allDates.add(d))
  if(inclTodo||inclDone) Object.keys(todos).filter(d=>d.startsWith(year)).forEach(d=>allDates.add(d))
  const dates = [...allDates].sort()

  if(!dates.length) return `[${year}년] 데이터가 없습니다.`

  const lines = []
  lines.push(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`)
  lines.push(`  ${year}년 기록`)
  lines.push(`  생성: ${new Date().toLocaleString("ko-KR")}`)
  lines.push(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`)
  lines.push("")

  let lastMonth = ""
  dates.forEach(dateStr=>{
    const month = dateStr.slice(0,7)
    if(month !== lastMonth){
      if(lastMonth) lines.push("")
      lines.push(`▶ ${dateStr.slice(0,4)}년 ${Number(dateStr.slice(5,7))}월`)
      lines.push("─".repeat(30))
      lastMonth = month
    }

    const dayOfWeek = ["일","월","화","수","목","금","토"][new Date(dateStr).getDay()]
    const dayLabel = `${Number(dateStr.slice(8))}일(${dayOfWeek})`

    const schedList = inclSched ? (schedEvents[dateStr]||[]) : []
    const todoList = todos[dateStr] || []
    const pendingList = inclTodo ? todoList.filter(t=>!t.done) : []
    const doneList = inclDone ? todoList.filter(t=>t.done) : []

    if(!schedList.length && !pendingList.length && !doneList.length) return

    lines.push(`\n  📆 ${dayLabel}`)
    if(schedList.length){
      lines.push("  [일정]")
      schedList.forEach(ev=>{
        const catStr = ev.category ? ` (${ev.category})` : ""
        lines.push(`    • ${ev.text}${catStr}`)
      })
    }
    if(pendingList.length){
      lines.push("  [할일]")
      pendingList.forEach(t=>{
        const carried = t.carriedFrom ? ` ↩${t.carriedFrom.slice(5).replace("-","/")}` : ""
        lines.push(`    ☐ ${t.text}${carried}`)
      })
    }
    if(doneList.length){
      lines.push("  [한일]")
      doneList.forEach(t=>lines.push(`    ✅ ${t.text}`))
    }
  })

  lines.push("")
  lines.push("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━")
  return lines.join("\n")
}

function refreshExportPreview(){
  const year = document.getElementById("exportYear").value
  const inclSched = document.getElementById("expSched").checked
  const inclTodo  = document.getElementById("expTodo").checked
  const inclDone  = document.getElementById("expDone").checked
  const preview = document.getElementById("exportPreview")
  if(!preview) return
  const text = buildExportText(year, inclSched, inclTodo, inclDone)
  const lines = text.split("\n")
  preview.value = lines.slice(0,40).join("\n") + (lines.length>40 ? "\n\n... (이후 "+(lines.length-40)+"줄)" : "")
}

    a.href = URL.createObjectURL(blob)

<!-- ══ Schedule Firebase 동기화 (module) ══ -->
<script type="module">
import{initializeApp,getApps,getApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const _SCH_CFG={apiKey:"AIzaSyA7ots3eKmIasUH4GW7nw797cdvEVP-Dk8",authDomain:"studyapp-58a1c.firebaseapp.com",projectId:"studyapp-58a1c",storageBucket:"studyapp-58a1c.firebasestorage.app",messagingSenderId:"481582276002",appId:"1:481582276002:web:4bebfca49c51cb8607e6fb"};
const _schApp=getApps().length?getApp():initializeApp(_SCH_CFG);
const _schAuth=getAuth(_schApp);
const _schDb=getFirestore(_schApp);

// ── 동기화 키
const SCH_WATCH_KEYS=new Set(['scheduleData','lmTodos','lmTodosDeleted','lmSchedDeleted']);

let _schUid=null, _schPushTimer=null, _schRestoring=false;
const _schNative=Storage.prototype.setItem.bind(localStorage);

/* localStorage 변경 감지 → scheduleData 변경 시 자동 push */
const _schChain=localStorage.setItem.bind(localStorage);
localStorage.setItem=function(key,val){
  _schChain(key,val);
  if(!_schRestoring&&_schUid&&SCH_WATCH_KEYS.has(key)) _schSchedulePush();
};

function _schSchedulePush(){
  clearTimeout(_schPushTimer);
  _schPushTimer=setTimeout(_schPush,4000);
}

async function _schPush(){
  if(!_schUid)return;
  try{
    const ts=Date.now();
    // schedule 필드에만 저장
    const schedData=localStorage.getItem('scheduleData');
    const lmTodos=localStorage.getItem('lmTodos');
    const lmTodosDeleted=localStorage.getItem('lmTodosDeleted');
    const lmSchedDeleted=localStorage.getItem('lmSchedDeleted');
    const payload={};
    if(schedData)payload.scheduleData=schedData;
    if(lmTodos)payload.lmTodos=lmTodos;
    if(lmTodosDeleted)payload.lmTodosDeleted=lmTodosDeleted;
    if(lmSchedDeleted)payload.lmSchedDeleted=lmSchedDeleted;
    await setDoc(doc(_schDb,'users',_schUid),{schedule:{data:JSON.stringify(payload),ts}},{merge:true});
    _schNative('__schFbTs__',String(ts));
  }catch(e){console.warn('[FB sch] push 실패:',e.message);}
}

async function _schPull(force=false){
  if(!_schUid)return;
  try{
    const localTs=Number(localStorage.getItem('__schFbTs__')||0);
    const snap=await getDoc(doc(_schDb,'users',_schUid));
    if(!snap.exists())return;
    const raw=snap.data();

    // ── schedule 필드에서 복원
    const schField=raw.schedule||null;

    let scheduleDataStr=null, lmTodosStr=null, fbTs=0;
    let parsedRemote=null; // tombstone 등 추가 키 접근용

    if(schField&&schField.data&&schField.ts){
      fbTs=schField.ts;
      if(!force&&fbTs<=localTs)return; // 로컬이 최신
      try{
        parsedRemote=JSON.parse(schField.data);
        scheduleDataStr=parsedRemote.scheduleData||null;
        lmTodosStr=parsedRemote.lmTodos||null;
      }catch{}
    }

    if(!scheduleDataStr)return;

    // tombstone 동기화: 원격 tombstone과 로컬 tombstone 합치기
    try{
      const remoteTodosDeleted=parsedRemote&&parsedRemote.lmTodosDeleted?JSON.parse(parsedRemote.lmTodosDeleted):{};
      const localTodosDeleted=JSON.parse(localStorage.getItem('lmTodosDeleted')||'{}');
      const mergedTodosDeleted={...localTodosDeleted};
      Object.keys(remoteTodosDeleted).forEach(date=>{
        mergedTodosDeleted[date]=[...new Set([...(mergedTodosDeleted[date]||[]),...(remoteTodosDeleted[date]||[])])];
      });
      _schNative('lmTodosDeleted',JSON.stringify(mergedTodosDeleted));

      const remoteSchedDeleted=parsedRemote&&parsedRemote.lmSchedDeleted?JSON.parse(parsedRemote.lmSchedDeleted):{};
      const localSchedDeleted=JSON.parse(localStorage.getItem('lmSchedDeleted')||'{}');
      const mergedSchedDeleted={...localSchedDeleted};
      Object.keys(remoteSchedDeleted).forEach(date=>{
        mergedSchedDeleted[date]=[...new Set([...(mergedSchedDeleted[date]||[]),...(remoteSchedDeleted[date]||[])])];
      });
      _schNative('lmSchedDeleted',JSON.stringify(mergedSchedDeleted));
    }catch{}

    _schRestoring=true;
    // ── scheduleData 병합: tombstone 기반 스마트 병합
    try{
      const remote=JSON.parse(scheduleDataStr);
      const localRaw=localStorage.getItem('scheduleData');
      const local=localRaw?JSON.parse(localRaw):{events:{},categories:[]};
      const merged=_mergeSched(local,remote);
      _schNative('scheduleData',JSON.stringify(merged));
      // 전역 data 갱신 + 재렌더
      try{window.data=merged;if(typeof window.render==='function')window.render();}catch{}
    }catch{}

    // lmTodos 병합: tombstone 기반 스마트 병합
    if(lmTodosStr){
      try{
        const remote=JSON.parse(lmTodosStr);
        const localRaw=localStorage.getItem('lmTodos');
        const local=localRaw?JSON.parse(localRaw):{};
        const merged=_mergeTodos(local,remote);
        _schNative('lmTodos',JSON.stringify(merged));
        // storage 이벤트로 사이드패널 갱신
        window.dispatchEvent(new StorageEvent('storage',{key:'lmTodos'}));
      }catch{}
    }

    _schNative('__schFbTs__',String(fbTs));
    _schRestoring=false;
  }catch(e){_schRestoring=false;console.warn('[FB sch] pull 실패:',e.message);}
}

/* ── lmTodos 스마트 병합: done=true 가 우선, tombstone으로 삭제 보호 ── */
function _mergeTodos(local,remote){
  const result={};
  let deletedIds={};
  try{ deletedIds=JSON.parse(localStorage.getItem('lmTodosDeleted')||'{}'); }catch{}
  const allDates=new Set([...Object.keys(local||{}),...Object.keys(remote||{})]);
  allDates.forEach(date=>{
    const lList=Array.isArray(local[date])?local[date]:[];
    const rList=Array.isArray(remote[date])?remote[date]:[];
    const deletedForDate=new Set(deletedIds[date]||[]);
    const map=new Map();
    // 로컬 항목 중 tombstone에 없는 것만
    lList.forEach(t=>{ if(!deletedForDate.has(String(t.id)))map.set(String(t.id),{...t}); });
    // 원격 항목: tombstone에 없는 것만 병합
    rList.forEach(t=>{
      const key=String(t.id);
      if(deletedForDate.has(key))return;
      if(map.has(key)){
        const existing=map.get(key);
        if(t.done&&!existing.done)map.set(key,{...existing,done:true});
      } else {
        map.set(key,{...t});
      }
    });
    const arr=Array.from(map.values());
    if(arr.length)result[date]=arr;
  });
  return result;
}

/* ── scheduleData 병합: tombstone으로 삭제된 일정 보호 ── */
function _mergeSched(local,remote){
  let deletedSched={};
  try{ deletedSched=JSON.parse(localStorage.getItem('lmSchedDeleted')||'{}'); }catch{}
  const result={
    categories:remote.categories||local.categories||[{name:'기본',color:'#6366f1'}],
    events:{}
  };
  const localEv=(local&&local.events)||{};
  const remoteEv=(remote&&remote.events)||{};
  const allDates=new Set([...Object.keys(localEv),...Object.keys(remoteEv)]);
  allDates.forEach(date=>{
    const lEvs=Array.isArray(localEv[date])?localEv[date]:[];
    const rEvs=Array.isArray(remoteEv[date])?remoteEv[date]:[];
    const deletedKeys=new Set(deletedSched[date]||[]);
    // 로컬 이벤트 중 tombstone에 없는 것만
    const merged=lEvs.filter(ev=>!deletedKeys.has(ev.text+'|'+(ev.category||'')));
    rEvs.forEach(ev=>{
      const key=ev.text+'|'+(ev.category||'');
      if(deletedKeys.has(key))return;
      const exists=merged.some(le=>le.text===ev.text&&(le.category||'')===(ev.category||''));
      if(!exists)merged.push(ev);
    });
    if(merged.length)result.events[date]=merged;
  });
  return result;
}

function _schSetUid(uid){
  _schUid=uid||null;
  if(_schUid) _schPull();
}

/* window에 노출 — header 버튼에서 호출 */
window.uploadScheduleToFirebase=async function(silent=false){
  if(!_schUid){if(!silent)alert('로그인이 필요합니다');return;}
  try{
    await _schPush();
    if(!silent)alert('Firebase에 저장되었습니다');
  }catch(e){if(!silent)alert('저장 실패: '+e.message);}
};
window.downloadScheduleFromFirebase=async function(silent=false){
  if(!_schUid){if(!silent)alert('로그인이 필요합니다');return;}
  await _schPull(true);
  if(!silent)alert('Firebase에서 불러왔습니다');
};

/* uid 감지 */
_schSetUid(localStorage.getItem('uid'));
window.addEventListener('storage',e=>{if(e.key==='uid')_schSetUid(e.newValue);});
onAuthStateChanged(_schAuth,user=>{
  if(user){
    Storage.prototype.setItem.bind(localStorage)('uid',user.uid);
  }
  _schSetUid(user?user.uid:null);
});

/* 탭 포커스 복귀 시 자동 pull */
window.addEventListener('focus',()=>{if(_schUid)_schPull();});

/* 초기 pull (로그인 상태이면) */
if(localStorage.getItem('uid')) _schPull();
</script>

<!-- 할일 사이드바 토글 버튼 -->
<button class="toggle-side-btn" id="toggleSideBtn" onclick="toggleSidePanel()">할일</button>

<!-- 할일 사이드 패널 -->
<div class="todo-side hidden" id="todoSide">
  <div class="todo-side-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:12px;font-weight:700;color:var(--accent);" id="sideDateLabel">오늘</div>
      <button onclick="toggleSidePanel()" style="border:none;background:transparent;cursor:pointer;color:var(--sub);font-size:14px;padding:0 4px;">&#10005;</button>
    </div>
    <div class="todo-side-tabs">
      <button class="todo-side-tab active" id="stab-todo" onclick="switchSideTab('todo')">할일</button>
      <button class="todo-side-tab" id="stab-done" onclick="switchSideTab('done')">한일</button>
      <button class="todo-side-tab" id="stab-sched" onclick="switchSideTab('sched')">일정</button>
    </div>
    <div id="sideInput" style="display:flex;gap:4px;">
      <input id="sideTodoInput" placeholder="추가..." onkeydown="if(event.key==='Enter')addSideItem()"
        style="flex:1;padding:5px 8px;border-radius:7px;border:1px solid var(--border);font-size:12px;background:var(--surface);color:var(--text);">
      <button onclick="addSideItem()" class="btn-primary" style="padding:5px 10px;border-radius:7px;font-size:13px;">+</button>
    </div>
  </div>
  <div id="sideList" style="flex:1;overflow-y:auto;padding:8px 10px;"></div>
  <div style="padding:8px 10px;border-top:1px solid var(--border);text-align:center;">
    <span style="font-size:11px;color:var(--sub);font-weight:600;" id="sideBadge">0/0</span>
  </div>
</div>

<script>
/* ══ schedule.html 할일 사이드 패널 ══ */
let sideTab = "todo"
let sideDate = (()=>{
  const d=new Date(); const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return y+"-"+m+"-"+day
})()

function toggleSidePanel(){
  const side = document.getElementById("todoSide")
  const container = document.querySelector(".container")
  const btn = document.getElementById("toggleSideBtn")
  const hidden = side.classList.toggle("hidden")
  if(container) container.classList.toggle("with-side", !hidden)
  btn.textContent = hidden ? "할일" : "✕"
  if(!hidden) renderSidePanel()
}

function switchSideTab(tab){
  sideTab = tab
  ;["todo","done","sched"].forEach(t=>{
    const b = document.getElementById("stab-"+t)
    if(b){ b.className = "todo-side-tab"+(t===tab?" active":"") }
  })
  const inp = document.getElementById("sideInput")
  if(inp) inp.style.display = tab==="done" ? "none" : "flex"
  renderSidePanel()
}

function getTodosForSide(date){
  try{
    const all = JSON.parse(localStorage.getItem("lmTodos")||"{}")
    return all[date||sideDate] || []
  }catch{ return [] }
}
function saveTodosFromSide(list, date){
  try{
    const all = JSON.parse(localStorage.getItem("lmTodos")||"{}")
    all[date||sideDate] = list
    localStorage.setItem("lmTodos", JSON.stringify(all))
  }catch{}
}

function addSideItem(){
  const inp = document.getElementById("sideTodoInput")
  const text = (inp?.value||"").trim(); if(!text) return
  if(sideTab === "sched"){
    // schedule 일정 추가
    const sd = data  // schedule.html의 전역 data 객체
    if(!sd.events) sd.events = {}
    if(!sd.events[sideDate]) sd.events[sideDate] = []
    sd.events[sideDate].push({ text, category: (sd.categories||[{name:"기본"}])[0]?.name||"기본" })
    save(); render()
  } else {
    // lmTodos 할일 추가
    const list = getTodosForSide()
    list.push({ id: Date.now(), text, done: false })
    saveTodosFromSide(list)
  }
  inp.value = ""
  renderSidePanel()
}

function toggleSideTodo(id){
  const list = getTodosForSide()
  const item = list.find(t=>t.id==id)
  if(item) item.done = !item.done
  saveTodosFromSide(list)
  renderSidePanel()
}
function deleteSideTodo(id){
  saveTodosFromSide(getTodosForSide().filter(t=>t.id!=id))
  renderSidePanel()
}
function editSideTodo(id){
  const row = document.querySelector(`#sideList .todo-item[data-id="${id}"]`)
  if(!row) return
  const list = getTodosForSide()
  const item = list.find(t=>t.id==id)
  if(!item) return
  row.innerHTML = `
    <input type="text" id="sideEditInp-${id}"
      style="flex:1;font-size:12px;border:1px solid var(--accent);border-radius:6px;
      padding:2px 6px;background:var(--surface);color:var(--text);min-width:0;"
      onkeydown="if(event.key==='Enter')saveSideTodoEdit(${id});else if(event.key==='Escape')renderSidePanel()">
    <button onclick="saveSideTodoEdit(${id})"
      style="padding:1px 7px;font-size:11px;border-radius:5px;
      background:var(--accent);color:#fff;border:none;cursor:pointer;flex-shrink:0;">✓</button>
    <button onclick="renderSidePanel()"
      style="padding:1px 5px;font-size:11px;border-radius:5px;
      color:var(--sub);background:transparent;border:none;cursor:pointer;flex-shrink:0;">✕</button>`
  const inp = document.getElementById(`sideEditInp-${id}`)
  inp.value = item.text
  inp.focus(); inp.select()
}
function saveSideTodoEdit(id){
  const inp = document.getElementById(`sideEditInp-${id}`)
  const text = inp?.value.trim(); if(!text) return
  const list = getTodosForSide()
  const item = list.find(t=>t.id==id)
  if(item){ item.text = text; saveTodosFromSide(list) }
  renderSidePanel()
}
function deleteSideSchedEvent(idx){
  if(!data.events?.[sideDate]) return
  data.events[sideDate].splice(idx, 1)
  save(); render(); renderSidePanel()
}

function renderSidePanel(){
  // 날짜 라벨 업데이트 (현재 선택된 달력 날짜)
  const today = (()=>{const d=new Date();const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+"-"+m+"-"+day})()
  const lbl = document.getElementById("sideDateLabel")
  if(lbl){ lbl.textContent = sideDate===today ? "오늘" : sideDate.slice(5).replace("-","/") }

  const el = document.getElementById("sideList"); if(!el) return
  el.innerHTML = ""

  if(sideTab === "sched"){
    // 일정 목록
    const events = (data.events||{})[sideDate] || []
    const cats = data.categories || []
    if(!events.length){
      el.innerHTML = '<div style="text-align:center;padding:16px;color:#9ca3af;font-size:12px;">이 날 일정이 없어요</div>'
    } else {
      events.forEach((ev,idx)=>{
        const cat = cats.find(c=>c.name===ev.category)
        const color = cat?.color||"#8b909a"
        const row = document.createElement("div")
        row.className = "todo-item"
        row.innerHTML = `
          <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ev.text}</span>
          <span style="font-size:10px;color:${color};font-weight:600;">${ev.category||""}</span>
          <button onclick="deleteSideSchedEvent(${idx})" style="border:none;background:transparent;color:#9ca3af;cursor:pointer;font-size:11px;padding:0 3px;">🗑</button>`
        el.appendChild(row)
      })
    }
    const badge = document.getElementById("sideBadge")
    if(badge) badge.textContent = `일정 ${(data.events?.[sideDate]||[]).length}개`
  } else {
    // 할일/한일
    const list = getTodosForSide()
    const filtered = sideTab==="done" ? list.filter(t=>t.done) : list.filter(t=>!t.done)
    const doneCount = list.filter(t=>t.done).length
    const badge = document.getElementById("sideBadge")
    if(badge) badge.textContent = `${doneCount}/${list.length}`

    if(!filtered.length){
      el.innerHTML = `<div style="text-align:center;padding:16px;color:#9ca3af;font-size:12px;">${sideTab==="done"?"완료한 항목이 없어요":"할일을 추가해보세요"}</div>`
    } else {
      filtered.forEach(todo=>{
        const row = document.createElement("div")
        row.className = "todo-item"
        row.dataset.id = todo.id
        row.innerHTML = `
          <span class="side-drag-handle" style="cursor:grab;color:var(--sub);font-size:12px;flex-shrink:0;padding:0 1px;user-select:none;opacity:0.5;">⠿</span>
          <input type="checkbox" ${todo.done?"checked":""} onchange="toggleSideTodo(${todo.id})"
            style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;">
          <span class="side-text-span" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" class="${todo.done?"todo-item-done":""}"></span>
          <button onclick="editSideTodo(${todo.id})" style="border:none;background:transparent;color:#9ca3af;cursor:pointer;font-size:12px;padding:0 2px;" title="수정">✎</button>
          <button onclick="deleteSideTodo(${todo.id})" style="border:none;background:transparent;color:#9ca3af;cursor:pointer;font-size:11px;padding:0 2px;">🗑</button>`
        row.querySelector(".side-text-span").textContent = todo.text
        if(todo.done) row.querySelector(".side-text-span").classList.add("todo-item-done")
        el.appendChild(row)
      })
      // 드래그 정렬
      if(window.Sortable){
        Sortable.create(el, {
          handle: ".side-drag-handle",
          animation: 120,
          onEnd(){
            const all = getTodosForSide()
            const pending = all.filter(t=>!t.done)
            const done    = all.filter(t=>t.done)
            const newOrder = [...el.querySelectorAll(".todo-item")].map(r=>Number(r.dataset.id))
            const source = sideTab==="done" ? done : pending
            const reordered = newOrder.map(id=>source.find(t=>t.id===id)).filter(Boolean)
            saveTodosFromSide(sideTab==="done" ? [...pending,...reordered] : [...reordered,...done])
          }
        })
      }
    }
  }
}

// storage 이벤트 — 다른 탭(링크매니저) 변경사항 반영
window.addEventListener("storage", e=>{
  if(e.key === "lmTodos"){
    const side = document.getElementById("todoSide")
    if(side && !side.classList.contains("hidden")) renderSidePanel()
  }
})

/* ═══════════════════════════════════════
   부모(linkmanage)에서 다크모드 메시지 받기
═══════════════════════════════════════ */
window.addEventListener('message', function(e) {
  if(e.data && e.data.type === 'theme-toggle'){
    var isDark = !!e.data.dark;
    document.body.classList.toggle('dark', isDark);
    localStorage.setItem('darkMode', isDark ? 'true' : 'false');
    localStorage.setItem('lmTheme', isDark ? 'dark' : 'light');
  }
}, false);

</script>
